<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beats &amp; Bourbon &mdash; Weekly Promo</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;0,900;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4A843;
    --gold-light: #F4C430;
    --dark-bg: #0D0B08;
    --cream: #F5F0E8;
    --border: rgba(212,168,67,0.5);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060608;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
    font-family: 'DM Sans', sans-serif;
    color: var(--cream);
  }
  /* ===== THE FLYER ===== */
  .sq-flyer {
    width: 1080px;
    aspect-ratio: 1/1;
    background: var(--dark-bg);
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 2.5px solid var(--border);
    border-radius: 2px;
  }
  /* Corner marks */
  .cm { position: absolute; border-color: var(--border); border-style: solid; }
  .cm.tl { top: 20px; left: 20px; width: 44px; height: 44px; border-width: 2px 0 0 2px; }
  .cm.tr { top: 20px; right: 20px; width: 44px; height: 44px; border-width: 2px 2px 0 0; }
  .cm.bl { bottom: 20px; left: 20px; width: 44px; height: 44px; border-width: 0 0 2px 2px; }
  .cm.br { bottom: 20px; right: 20px; width: 44px; height: 44px; border-width: 0 2px 2px 0; }
  /* Brand header */
  .sq-brand {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    padding: 6% 7% 0;
    gap: 5%;
  }
  .emblem-ring {
    width: 120px;
    height: 120px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }
  .emblem-ring::before {
    content: '';
    position: absolute;
    width: calc(100% + 14px);
    height: calc(100% + 14px);
    border: 1px solid rgba(212,168,67,0.22);
    border-radius: 50%;
  }
  .emblem-text {
    font-family: 'Bodoni Moda', serif;
    color: var(--cream);
    text-align: center;
    line-height: 1.15;
    letter-spacing: 2px;
    font-weight: 700;
    font-size: 16px;
  }
  .e-amp {
    color: var(--gold);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    letter-spacing: 0;
    font-size: 0.8em;
  }
  .sq-brand-text { display: flex; flex-direction: column; }
  .brand-name {
    font-family: 'Bodoni Moda', serif;
    font-size: 56px;
    font-weight: 900;
    color: var(--cream);
    letter-spacing: 2px;
    line-height: 1.05;
  }
  .brand-amp {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--gold);
    font-size: 0.7em;
  }
  .brand-date {
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-weight: 600;
    margin-top: 10px;
  }
  .brand-tagline {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: rgba(212,168,67,0.5);
    margin-top: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
  }
  /* Divider */
  .sq-divider {
    width: 86%;
    height: 1px;
    background: linear-gradient(90deg, var(--gold), rgba(212,168,67,0.15));
    margin: 4% 7%;
  }
  /* Lineup rows */
  .sq-lineup {
    flex: 1;
    padding: 0 7% 5%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .sq-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .sq-row:last-child { border-bottom: none; }
  .sq-slot {
    font-family: 'DM Sans', sans-serif;
    font-size: 20px;
    letter-spacing: 1.5px;
    color: var(--cream);
    text-transform: uppercase;
    font-weight: 600;
    min-width: 35%;
  }
  .sq-dj {
    font-family: 'Bodoni Moda', serif;
    font-size: 36px;
    color: var(--gold);
    font-weight: 700;
    text-align: right;
  }
  .sq-dj.open {
    color: rgba(245,240,232,0.12);
    font-style: italic;
    font-weight: 400;
    font-size: 28px;
  }
  .sq-dj.anchor {
    color: var(--gold);
  }
  .sq-anchor-mark {
    font-size: 14px;
    color: rgba(212,168,67,0.5);
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-left: 8px;
  }
  /* Bottom */
  .sq-bottom {
    flex: 0 0 auto;
    padding: 0 7% 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sq-tagline {
    font-size: 14px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(245,240,232,0.2);
  }
  .sq-stream-label {
    font-size: 14px;
    color: rgba(212,168,67,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .loading-msg {
    text-align: center;
    color: rgba(245,240,232,0.3);
    font-size: 20px;
    padding: 40px;
    font-style: italic;
  }
#bb-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -1;
  /* Canvas draws at 1080×1080 internally, CSS scales to viewport */
}
</style>
</head>
<body>
<canvas id="bb-bg"></canvas>

<div class="sq-flyer">
  <div class="cm tl"></div>
  <div class="cm tr"></div>
  <div class="cm bl"></div>
  <div class="cm br"></div>
  <div class="sq-brand">
    <div class="emblem-ring">
      <div class="emblem-text">BEATS<br><span class="e-amp">&amp;</span><br>BOURBON</div>
    </div>
    <div class="sq-brand-text">
      <div class="brand-name">BEATS <span class="brand-amp">&amp;</span> BOURBON</div>
      <div class="brand-date" id="brand-date">Loading...</div>
      <div class="brand-tagline">Premium Saturday Sounds</div>
    </div>
  </div>
  <div class="sq-divider"></div>
  <div class="sq-lineup" id="lineup-slots">
    <div class="loading-msg">Loading schedule...</div>
  </div>
  <div class="sq-bottom">
    <span class="sq-tagline">Premium Saturday Sounds</span>
    <span class="sq-stream-label">Reebootradio LLC</span>
  </div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxrZkrfdk6fsqD56uv1dY0kuBkEqEm8TfF_n6MRCfr88w_gHZ_Xo7n3RPdVpGp6X5hp/exec';

function getNextSaturdayStr() {
  var etStr = new Date().toLocaleString('en-US', { timeZone: 'America/New_York' });
  var et = new Date(etStr);
  var day = et.getDay();
  if (day !== 6) {
    var daysUntil = (6 - day + 7) % 7;
    et.setDate(et.getDate() + daysUntil);
  }
  var months = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
  return 'Saturday \u2014 ' + months[et.getMonth()] + ' ' + et.getDate() + ', ' + et.getFullYear();
}

// Shorten "12:00 PM - 2:00 PM" to "12 PM \u2013 2 PM"
function shortTime(t) {
  var parts = t.split(/\s*[-\u2013]\s*/);
  if (parts.length !== 2) return t;
  var startMatch = parts[0].match(/(\d{1,2})(?::00)?\s*(AM|PM)/i);
  var endMatch = parts[1].match(/(\d{1,2})(?::00)?\s*(AM|PM)/i);
  if (!startMatch || !endMatch) return t;
  return startMatch[1] + ' ' + startMatch[2].toUpperCase() + ' \u2013 ' + endMatch[1] + ' ' + endMatch[2].toUpperCase();
}

function cleanDJName(name) {
  return name.replace(/\s*\(Anchor\)/i, '');
}

function escapeHTML(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function renderSchedule(data) {
  document.getElementById('brand-date').textContent = getNextSaturdayStr();

  var slotsEl = document.getElementById('lineup-slots');
  var schedule = data.schedule || [];

  if (schedule.length === 0) {
    slotsEl.innerHTML = '<div class="loading-msg">Schedule coming soon...</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < schedule.length; i++) {
    var s = schedule[i];
    var djDisplay = s.dj ? cleanDJName(s.dj) : '';
    var isOpen = !s.dj || s.status === 'UNFILLED';
    var isAnchor = s.status === 'LOCKED';

    html += '<div class="sq-row">';
    html += '<span class="sq-slot">' + escapeHTML(shortTime(s.timeSlot)) + '</span>';

    if (isOpen) {
      html += '<span class="sq-dj open">\u2014 Open \u2014</span>';
    } else {
      html += '<span class="sq-dj' + (isAnchor ? ' anchor' : '') + '">' + escapeHTML(djDisplay);
      if (isAnchor) html += '<span class="sq-anchor-mark">\u2605</span>';
      html += '</span>';
    }

    html += '</div>';
  }

  slotsEl.innerHTML = html;
}

function fetchSchedule() {
  fetch(GAS_URL + '?action=getSchedule')
    .then(function(res) { return res.json(); })
    .then(function(data) { renderSchedule(data); })
    .catch(function(err) {
      console.error('Fetch error:', err);
      loadViaJSONP();
    });
}

function loadViaJSONP() {
  var callbackName = '_bbPromoCb_' + Date.now();
  window[callbackName] = function(data) {
    renderSchedule(data);
    delete window[callbackName];
    var script = document.getElementById('jsonp-promo');
    if (script) script.remove();
  };
  var s = document.createElement('script');
  s.id = 'jsonp-promo';
  s.src = GAS_URL + '?action=getSchedule&callback=' + callbackName;
  s.onerror = function() {
    document.getElementById('lineup-slots').innerHTML = '<div class="loading-msg">Unable to load schedule</div>';
  };
  document.head.appendChild(s);
}

fetchSchedule();
</script>
<script>const BBDamask = (() => {

  /* ── THEME DEFINITIONS ────────────────────────────────────
     bg[0] = center-top highlight, bg[1] = corner dark
     r[0]  = darkest motif shadow
     r[1]  = dark motif base
     r[2]  = mid motif warm
     r[3]  = light motif accent
     r[4]  = lightest motif highlight
  ──────────────────────────────────────────────────────── */
  const THEMES = {
    classic:  {
      bg: ['#1C0B02', '#0C0500'],
      r:  ['#41220D', '#7A4820', '#9D6632', '#D4A850', '#FDF4E0']
    },
    midnight: {
      bg: ['#02060E', '#010308'],
      r:  ['#0A1A3A', '#152E60', '#1A4080', '#6090D0', '#C0D8F8']
    },
    crimson:  {
      bg: ['#0E0202', '#050001'],
      r:  ['#3A0808', '#680F0F', '#901818', '#D04040', '#F8C0C0']
    },
    sunset:   {
      bg: ['#0E0802', '#050300'],
      r:  ['#3A1A04', '#702808', '#A04010', '#E07030', '#F8C090']
    },
    purple:   {
      bg: ['#06010E', '#02000A'],
      r:  ['#1A0632', '#3A1468', '#5C28A0', '#B878E8', '#E0C0F8']
    }
  };

  /* ── TILE SPEC (from BB_FLYER_SYSTEM.md) ─────────────────
     118×112px, brick-offset (odd rows shift TW/2), alpha 0.90  */
  const TW = 118, TH = 112;
  const CANVAS_SIZE = 1080;

  /* ── HELPERS ─────────────────────────────────────────── */
  function wa(hex, a) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function radialGrad(ctx, cx, cy, r0, r1, ramp) {
    const g = ctx.createRadialGradient(cx, cy, r0, cx, cy, r1);
    g.addColorStop(0,    ramp[4]);
    g.addColorStop(0.30, ramp[3]);
    g.addColorStop(0.60, ramp[2]);
    g.addColorStop(0.85, ramp[1]);
    g.addColorStop(1,    ramp[0]);
    return g;
  }

  /* ── MOTIF DRAW (11-part botanical anatomy) ──────────────
     Called with ctx translated to tile center, no scaling.
     All coordinates relative to (0,0) at motif center.         */
  function drawMotif(ctx, ramp) {

    /* PETAL — pointed bezier blade radiating from y=-28 toward tip */
    function petal(tx, ty, hw) {
      const bx = tx * 0.12;
      const ht = ty + 28;
      ctx.beginPath();
      ctx.moveTo(-bx, -28);
      ctx.bezierCurveTo(-hw, -28 + ht * 0.30, tx - hw * 0.5, ty - ht * 0.35, tx, ty);
      ctx.bezierCurveTo( tx + hw * 0.5, ty - ht * 0.35,  hw, -28 + ht * 0.30, bx, -28);
      ctx.closePath();
      ctx.fillStyle = radialGrad(ctx, tx * 0.4, ty + Math.abs(ht) * 0.35, 0, Math.abs(ht) * 0.65, ramp);
      ctx.fill();
    }

    /* WING — one acanthus leaf (right-upper orientation).
       Mirror with ctx.scale(-1,1) / ctx.scale(1,-1) for other three. */
    function wing() {
      // Primary lobe — pointed bezier silhouette, NOT an arc
      ctx.beginPath();
      ctx.moveTo(4, -20);
      ctx.bezierCurveTo(14, -28, 32, -24, 44, -15);
      ctx.bezierCurveTo(40, -10, 24,  -7,  6, -10);
      ctx.closePath();
      ctx.fillStyle = radialGrad(ctx, 24, -17, 0, 26, ramp);
      ctx.fill();

      // Secondary lobe (lower acanthus curl)
      ctx.beginPath();
      ctx.moveTo(5, -10);
      ctx.bezierCurveTo(14, -16, 28, -11, 36, -5);
      ctx.bezierCurveTo(28,  -1, 14,   0,  5, -3);
      ctx.closePath();
      ctx.fillStyle = radialGrad(ctx, 18, -7, 0, 20, ramp);
      ctx.fill();

      // Botanical vein stroke — single bezier line along primary lobe
      ctx.beginPath();
      ctx.moveTo(5, -14);
      ctx.bezierCurveTo(20, -17, 36, -14, 44, -15);
      ctx.strokeStyle = ramp[3];
      ctx.lineWidth   = 0.9;
      ctx.setLineDash([]);
      ctx.stroke();
    }

    // 1 & 2. OUTER OVAL FRAME — 2 concentric ellipses
    ctx.strokeStyle = ramp[2]; ctx.lineWidth = 1.3;
    ctx.beginPath(); ctx.ellipse(0, 0, 44, 52, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = ramp[1]; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.ellipse(0, 0, 38, 46, 0, 0, Math.PI * 2); ctx.stroke();

    // 3. CROWN — 5 petals radiating upward from y=-28
    petal( 0,  -50, 2.5);  // center spike
    petal(-8,  -46, 3.5);  // inner left
    petal( 8,  -46, 3.5);  // inner right
    petal(-16, -42, 4.5);  // outer left
    petal( 16, -42, 4.5);  // outer right

    // 4. BASE — mirror of crown (scale y=-1 to flip downward)
    ctx.save(); ctx.scale(1, -1);
    petal( 0,  -50, 2.5);
    petal(-8,  -46, 3.5); petal( 8, -46, 3.5);
    petal(-16, -42, 4.5); petal(16, -42, 4.5);
    ctx.restore();

    // 5. TOP COLLAR — ellipse just below crown base
    ctx.beginPath(); ctx.ellipse(0, -32, 9, 5, 0, 0, Math.PI * 2);
    ctx.fillStyle = radialGrad(ctx, 0, -32, 0, 10, ramp); ctx.fill();

    // 6. BOTTOM COLLAR — mirror of top
    ctx.beginPath(); ctx.ellipse(0, 32, 9, 5, 0, 0, Math.PI * 2);
    ctx.fillStyle = radialGrad(ctx, 0, 32, 0, 10, ramp); ctx.fill();

    // 7. BODY COLUMN — narrow vertical rectangle with linear gradient
    ctx.beginPath(); ctx.roundRect(-3, -28, 6, 56, 2);
    const colGrad = ctx.createLinearGradient(-3, 0, 3, 0);
    colGrad.addColorStop(0,   ramp[0]);
    colGrad.addColorStop(0.5, ramp[3]);
    colGrad.addColorStop(1,   ramp[0]);
    ctx.fillStyle = colGrad; ctx.fill();

    // 8-11. FOUR ACANTHUS WINGS (right-up, left-up, right-down, left-down)
    wing();
    ctx.save(); ctx.scale(-1,  1); wing(); ctx.restore();  // left-upper
    ctx.save(); ctx.scale( 1, -1); wing(); ctx.restore();  // right-lower
    ctx.save(); ctx.scale(-1, -1); wing(); ctx.restore();  // left-lower

    // 12a. WAIST ELLIPSE — center horizontal accent
    ctx.beginPath(); ctx.ellipse(0, 0, 6, 4, 0, 0, Math.PI * 2);
    ctx.fillStyle = radialGrad(ctx, 0, 0, 0, 7, ramp); ctx.fill();

    // 12b. SIDE OVALS — flanking the waist
    [-13, 13].forEach(x => {
      ctx.beginPath(); ctx.ellipse(x, 0, 4, 3, 0, 0, Math.PI * 2);
      ctx.fillStyle = radialGrad(ctx, x, 0, 0, 6, ramp); ctx.fill();
    });

    // 13. CENTER JEWEL — 3 concentric layers: outer glow, dark recess, bright dot
    ctx.beginPath(); ctx.ellipse(0, 0, 7, 7, 0, 0, Math.PI * 2);
    ctx.fillStyle = wa(ramp[2], 0.55); ctx.fill();           // outer glow
    ctx.beginPath(); ctx.ellipse(0, 0, 4, 4, 0, 0, Math.PI * 2);
    ctx.fillStyle = ramp[0]; ctx.fill();                      // dark recess
    ctx.beginPath(); ctx.ellipse(0, 0, 2, 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = ramp[4]; ctx.fill();                      // inner bright dot
  }

  /* ── TILE LAYER ───────────────────────────────────────────
     Fills canvas W×H with brick-offset tile grid at globalAlpha 0.90 */
  function drawDamaskLayer(ctx, W, H, ramp) {
    ctx.save();
    ctx.globalAlpha = 0.90;

    const cols = Math.ceil(W / TW) + 2;
    const rows = Math.ceil(H / TH) + 2;

    for (let row = -1; row < rows; row++) {
      const xOff = (row % 2 !== 0) ? TW / 2 : 0;
      for (let col = -1; col < cols; col++) {
        ctx.save();
        ctx.translate(col * TW + xOff + TW / 2, row * TH + TH / 2);
        drawMotif(ctx, ramp);
        ctx.restore();
      }
    }
    ctx.restore();
  }

  /* ── FILM GRAIN ──────────────────────────────────────── */
  function applyGrain(ctx, W, H) {
    const imgd = ctx.getImageData(0, 0, W, H);
    const d    = imgd.data;
    for (let i = 0; i < d.length; i += 4) {
      const n = (Math.random() - 0.5) * 16;
      d[i] += n; d[i+1] += n; d[i+2] += n;
    }
    ctx.putImageData(imgd, 0, 0);
  }

  /* ── PUBLIC: render(themeName) ────────────────────────── */
  function render(themeName) {
    const key    = (themeName || 'classic').toLowerCase();
    const theme  = THEMES[key] || THEMES.classic;
    const canvas = document.getElementById('bb-bg');
    if (!canvas) return;

    canvas.width  = CANVAS_SIZE;
    canvas.height = CANVAS_SIZE;

    const ctx = canvas.getContext('2d');
    const W   = CANVAS_SIZE;
    const H   = CANVAS_SIZE;
    const {bg, r} = theme;

    // Layer 1: radial gradient base (bright center-top → dark corners)
    const base = ctx.createRadialGradient(W * .5, H * .3, 0, W * .5, H * .5, W * .8);
    base.addColorStop(0, bg[0]);
    base.addColorStop(1, bg[1]);
    ctx.fillStyle = base;
    ctx.fillRect(0, 0, W, H);

    // Layer 2: damask tile (globalAlpha 0.90 inside)
    drawDamaskLayer(ctx, W, H, r);

    // Layer 3: top center bloom
    const bloom = ctx.createRadialGradient(W * .5, 0, 0, W * .5, 0, W * .6);
    bloom.addColorStop(0, wa(r[2], 0.32));
    bloom.addColorStop(1, wa(r[2], 0));
    ctx.fillStyle = bloom;
    ctx.fillRect(0, 0, W, H);

    // Layer 4: vignette (dark corners)
    const vig = ctx.createRadialGradient(W * .5, H * .5, W * .18, W * .5, H * .5, W * .78);
    vig.addColorStop(0, 'transparent');
    vig.addColorStop(1, 'rgba(0,0,0,0.72)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    // Layer 5: bottom fade (last 30% of canvas height)
    const btm = ctx.createLinearGradient(0, H * .68, 0, H);
    btm.addColorStop(0, 'transparent');
    btm.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = btm;
    ctx.fillRect(0, 0, W, H);

    // Layer 6: film grain (applied last, over everything)
    applyGrain(ctx, W, H);
  }

  return { render };

})();


/* ── INIT ────────────────────────────────────────────────────
   Call this wherever you currently set the active theme.
   If you fetch theme from GAS, call after the fetch resolves:

     fetch(GAS_URL + '?action=getTheme')
       .then(r => r.json())
       .then(d => BBDamask.render(d.theme));

   Or call directly if theme is known at page load:

     BBDamask.render('purple');
──────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  // REPLACE 'classic' with however you currently resolve the active theme
  BBDamask.render('classic');
});
var _orig = renderSchedule;
renderSchedule = function(d) {
  _orig(d);
  var t = (d && d.theme) ? d.theme.toLowerCase().split(' ')[0] : 'purple';
  if (typeof BBDamask !== 'undefined') { BBDamask.render(t); }
};
if (typeof BBDamask !== 'undefined') { BBDamask.render('purple'); }
</script>
</body>
</html>
