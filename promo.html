<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beats &amp; Bourbon &mdash; Weekly Promo</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;0,900;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4A843;
    --gold-light: #F4C430;
    --dark-bg: #0D0B08;
    --cream: #F5F0E8;
    --border: rgba(212,168,67,0.5);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060608;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
    font-family: 'DM Sans', sans-serif;
    color: var(--cream);
  }
  /* ===== THE FLYER ===== */
  .sq-flyer {
    width: 1080px;
    aspect-ratio: 1/1;
    background: var(--dark-bg);
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 2.5px solid var(--border);
    border-radius: 2px;
  }
  /* Corner marks */
  .cm { position: absolute; border-color: var(--border); border-style: solid; }
  .cm.tl { top: 20px; left: 20px; width: 44px; height: 44px; border-width: 2px 0 0 2px; }
  .cm.tr { top: 20px; right: 20px; width: 44px; height: 44px; border-width: 2px 2px 0 0; }
  .cm.bl { bottom: 20px; left: 20px; width: 44px; height: 44px; border-width: 0 0 2px 2px; }
  .cm.br { bottom: 20px; right: 20px; width: 44px; height: 44px; border-width: 0 2px 2px 0; }
  /* Brand header */
  .sq-brand {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    padding: 6% 7% 0;
    gap: 5%;
  }
  .emblem-ring {
    width: 120px;
    height: 120px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }
  .emblem-ring::before {
    content: '';
    position: absolute;
    width: calc(100% + 14px);
    height: calc(100% + 14px);
    border: 1px solid rgba(212,168,67,0.22);
    border-radius: 50%;
  }
  .emblem-text {
    font-family: 'Bodoni Moda', serif;
    color: var(--cream);
    text-align: center;
    line-height: 1.15;
    letter-spacing: 2px;
    font-weight: 700;
    font-size: 16px;
  }
  .e-amp {
    color: var(--gold);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    letter-spacing: 0;
    font-size: 0.8em;
  }
  .sq-brand-text { display: flex; flex-direction: column; }
  .brand-name {
    font-family: 'Bodoni Moda', serif;
    font-size: 56px;
    font-weight: 900;
    color: var(--cream);
    letter-spacing: 2px;
    line-height: 1.05;
  }
  .brand-amp {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--gold);
    font-size: 0.7em;
  }
  .brand-date {
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-weight: 600;
    margin-top: 10px;
  }
  .brand-tagline {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: rgba(212,168,67,0.5);
    margin-top: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
  }
  /* Divider */
  .sq-divider {
    width: 86%;
    height: 1px;
    background: linear-gradient(90deg, var(--gold), rgba(212,168,67,0.15));
    margin: 4% 7%;
  }
  /* Lineup rows */
  .sq-lineup {
    flex: 1;
    padding: 0 7% 5%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .sq-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .sq-row:last-child { border-bottom: none; }
  .sq-slot {
    font-family: 'DM Sans', sans-serif;
    font-size: 20px;
    letter-spacing: 1.5px;
    color: var(--cream);
    text-transform: uppercase;
    font-weight: 600;
    min-width: 35%;
  }
  .sq-dj {
    font-family: 'Bodoni Moda', serif;
    font-size: 36px;
    color: var(--gold);
    font-weight: 700;
    text-align: right;
  }
  .sq-dj.open {
    color: rgba(245,240,232,0.12);
    font-style: italic;
    font-weight: 400;
    font-size: 28px;
  }
  .sq-dj.anchor {
    color: var(--gold);
  }
  .sq-anchor-mark {
    font-size: 14px;
    color: rgba(212,168,67,0.5);
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-left: 8px;
  }
  /* Bottom */
  .sq-bottom {
    flex: 0 0 auto;
    padding: 0 7% 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sq-tagline {
    font-size: 14px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(245,240,232,0.2);
  }
  .sq-stream-label {
    font-size: 14px;
    color: rgba(212,168,67,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .loading-msg {
    text-align: center;
    color: rgba(245,240,232,0.3);
    font-size: 20px;
    padding: 40px;
    font-style: italic;
  }
  /* ===== DAMASK BACKGROUND ===== */
  #bb-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }
  .sq-brand, .sq-divider, .sq-lineup, .sq-bottom,
  .cm { position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="sq-flyer">
  <canvas id="bb-bg" width="1080" height="1080"></canvas>
  <div class="cm tl"></div>
  <div class="cm tr"></div>
  <div class="cm bl"></div>
  <div class="cm br"></div>
  <div class="sq-brand">
    <div class="emblem-ring">
      <div class="emblem-text">BEATS<br><span class="e-amp">&amp;</span><br>BOURBON</div>
    </div>
    <div class="sq-brand-text">
      <div class="brand-name">BEATS <span class="brand-amp">&amp;</span> BOURBON</div>
      <div class="brand-date" id="brand-date">Loading...</div>
      <div class="brand-tagline">Premium Saturday Sounds</div>
    </div>
  </div>
  <div class="sq-divider"></div>
  <div class="sq-lineup" id="lineup-slots">
    <div class="loading-msg">Loading schedule...</div>
  </div>
  <div class="sq-bottom">
    <span class="sq-tagline">Premium Saturday Sounds</span>
    <span class="sq-stream-label">Reebootradio LLC</span>
  </div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwBkmIae1QyhVvCvGJbTMWieKmgjYuS5-cODwJvDpFhVsv9lunxTnRYdVuX43m5LIOV/exec';

function getNextSaturdayStr() {
  var etStr = new Date().toLocaleString('en-US', { timeZone: 'America/New_York' });
  var et = new Date(etStr);
  var day = et.getDay();
  if (day !== 6) {
    var daysUntil = (6 - day + 7) % 7;
    et.setDate(et.getDate() + daysUntil);
  }
  var months = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
  return 'Saturday \u2014 ' + months[et.getMonth()] + ' ' + et.getDate() + ', ' + et.getFullYear();
}

// Shorten "12:00 PM - 2:00 PM" to "12 PM \u2013 2 PM"
function shortTime(t) {
  var parts = t.split(/\s*[-\u2013]\s*/);
  if (parts.length !== 2) return t;
  var startMatch = parts[0].match(/(\d{1,2})(?::00)?\s*(AM|PM)/i);
  var endMatch = parts[1].match(/(\d{1,2})(?::00)?\s*(AM|PM)/i);
  if (!startMatch || !endMatch) return t;
  return startMatch[1] + ' ' + startMatch[2].toUpperCase() + ' \u2013 ' + endMatch[1] + ' ' + endMatch[2].toUpperCase();
}

function cleanDJName(name) {
  return name.replace(/\s*\(Anchor\)/i, '');
}

function escapeHTML(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function renderSchedule(data) {
  document.getElementById('brand-date').textContent = getNextSaturdayStr();

  var slotsEl = document.getElementById('lineup-slots');
  var schedule = data.schedule || [];

  if (schedule.length === 0) {
    slotsEl.innerHTML = '<div class="loading-msg">Schedule coming soon...</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < schedule.length; i++) {
    var s = schedule[i];
    var djDisplay = s.dj ? cleanDJName(s.dj) : '';
    var isOpen = !s.dj || s.status === 'UNFILLED';
    var isAnchor = s.status === 'LOCKED';

    html += '<div class="sq-row">';
    html += '<span class="sq-slot">' + escapeHTML(shortTime(s.timeSlot)) + '</span>';

    if (isOpen) {
      html += '<span class="sq-dj open">\u2014 Open \u2014</span>';
    } else {
      html += '<span class="sq-dj' + (isAnchor ? ' anchor' : '') + '">' + escapeHTML(djDisplay);
      if (isAnchor) html += '<span class="sq-anchor-mark">\u2605</span>';
      html += '</span>';
    }

    html += '</div>';
  }

  slotsEl.innerHTML = html;
}

function fetchSchedule() {
  fetch(GAS_URL + '?action=getSchedule')
    .then(function(res) { return res.json(); })
    .then(function(data) { renderSchedule(data); })
    .catch(function(err) {
      console.error('Fetch error:', err);
      loadViaJSONP();
    });
}

function loadViaJSONP() {
  var callbackName = '_bbPromoCb_' + Date.now();
  window[callbackName] = function(data) {
    renderSchedule(data);
    delete window[callbackName];
    var script = document.getElementById('jsonp-promo');
    if (script) script.remove();
  };
  var s = document.createElement('script');
  s.id = 'jsonp-promo';
  s.src = GAS_URL + '?action=getSchedule&callback=' + callbackName;
  s.onerror = function() {
    document.getElementById('lineup-slots').innerHTML = '<div class="loading-msg">Unable to load schedule</div>';
  };
  document.head.appendChild(s);
}

fetchSchedule();
</script>

<!-- ===== BBDamask: Damask tile background system ===== -->
<script>
var BBDamask = (function() {
  'use strict';

  // --- Tile dimensions (spec: 118×112 px) ---
  var TW = 118, TH = 112;

  // --- Theme color ramps: 5-stop radial gradients ---
  // Each array: [darkest … lightest] used for radialGradient stops
  var THEMES = {
    purple:   ['#1A0A2E', '#2D1B4E', '#4A2D7A', '#6B3FA0', '#8B5CC0'],
    gold:     ['#1A1000', '#3D2B0A', '#6B4D1A', '#9B7030', '#C49340'],
    teal:     ['#001A1A', '#0A2D2D', '#1A4D4D', '#2A7070', '#3A9090'],
    burgundy: ['#1A0008', '#2D0A1A', '#4D1A2D', '#702A40', '#903A55'],
    navy:     ['#000A1A', '#0A1A2D', '#1A2D4D', '#2A4070', '#3A5590'],
    crimson:  ['#1A0000', '#2D0A0A', '#4D1A1A', '#702A2A', '#903A3A'],
    emerald:  ['#001A0A', '#0A2D1B', '#1A4D2D', '#2A7040', '#3A9055']
  };

  // --- Helpers ---
  function mkGrad(ctx, cx, cy, r, stops) {
    var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    for (var i = 0; i < stops.length; i++) {
      g.addColorStop(i / (stops.length - 1), stops[i]);
    }
    return g;
  }

  function ellipse(ctx, cx, cy, rx, ry) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(rx, ry);
    ctx.beginPath();
    ctx.arc(0, 0, 1, 0, Math.PI * 2);
    ctx.restore();
  }

  // --- Draw one damask motif centered at (cx, cy) ---
  // All coordinates relative to center; motif fits ~80×100 within 118×112 tile
  function drawMotif(ctx, cx, cy, colors) {
    var c = colors; // 5-stop array

    ctx.save();
    ctx.translate(cx, cy);

    // 11. Outer oval frame — 2 concentric ellipses
    var frameGrad = mkGrad(ctx, 0, 0, 52, c);
    ctx.fillStyle = frameGrad;
    ellipse(ctx, 0, 0, 46, 52);
    ctx.fill();
    ctx.strokeStyle = c[3];
    ctx.lineWidth = 0.8;
    ellipse(ctx, 0, 0, 46, 52);
    ctx.stroke();
    ctx.strokeStyle = c[2];
    ctx.lineWidth = 0.5;
    ellipse(ctx, 0, 0, 42, 48);
    ctx.stroke();

    // Fill interior dark
    ctx.fillStyle = c[0];
    ellipse(ctx, 0, 0, 40, 46);
    ctx.fill();

    // 1. Crown — 5-petal top (center spike + 2 side + 2 outer)
    var crownGrad = mkGrad(ctx, 0, -34, 18, c);
    ctx.fillStyle = crownGrad;

    // Center spike
    ctx.beginPath();
    ctx.moveTo(0, -44);
    ctx.bezierCurveTo(-2, -38, -3, -32, -2, -26);
    ctx.lineTo(2, -26);
    ctx.bezierCurveTo(3, -32, 2, -38, 0, -44);
    ctx.fill();

    // Side petals (left & right)
    ctx.beginPath();
    ctx.moveTo(-3, -38);
    ctx.bezierCurveTo(-8, -42, -14, -40, -12, -34);
    ctx.bezierCurveTo(-10, -30, -5, -28, -3, -28);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(3, -38);
    ctx.bezierCurveTo(8, -42, 14, -40, 12, -34);
    ctx.bezierCurveTo(10, -30, 5, -28, 3, -28);
    ctx.fill();

    // Outer petals
    ctx.beginPath();
    ctx.moveTo(-10, -36);
    ctx.bezierCurveTo(-16, -42, -22, -38, -18, -32);
    ctx.bezierCurveTo(-15, -28, -10, -28, -8, -28);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(10, -36);
    ctx.bezierCurveTo(16, -42, 22, -38, 18, -32);
    ctx.bezierCurveTo(15, -28, 10, -28, 8, -28);
    ctx.fill();

    // 2. Collar — ellipse below crown
    var collarGrad = mkGrad(ctx, 0, -24, 10, c);
    ctx.fillStyle = collarGrad;
    ellipse(ctx, 0, -24, 10, 4);
    ctx.fill();

    // 3. Body — narrow rectangle column (upper)
    var bodyGrad = mkGrad(ctx, 0, -12, 14, c);
    ctx.fillStyle = bodyGrad;
    ctx.fillRect(-3, -20, 6, 16);

    // 4. Upper wings — 2 acanthus leaves per side WITH bezier silhouettes
    drawAcanthusWing(ctx, -1, -14, -1, c);  // left pair
    drawAcanthusWing(ctx, 1, -14, 1, c);    // right pair

    // 5. Waist — ellipse + side ovals
    var waistGrad = mkGrad(ctx, 0, 0, 12, c);
    ctx.fillStyle = waistGrad;
    ellipse(ctx, 0, 0, 12, 5);
    ctx.fill();
    ctx.fillStyle = c[3];
    ellipse(ctx, -14, 0, 4, 3);
    ctx.fill();
    ellipse(ctx, 14, 0, 4, 3);
    ctx.fill();

    // 6. Lower wings — mirror of upper wings
    drawAcanthusWing(ctx, -1, 14, -1, c);   // left pair (mirrored Y)
    drawAcanthusWing(ctx, 1, 14, 1, c);     // right pair (mirrored Y)

    // 7. Lower body — column
    ctx.fillStyle = bodyGrad;
    ctx.fillRect(-3, 4, 6, 16);

    // 8. Lower collar — ellipse
    ctx.fillStyle = collarGrad;
    ellipse(ctx, 0, 24, 10, 4);
    ctx.fill();

    // 9. Base — 5-petal bottom (mirror of crown)
    var baseGrad = mkGrad(ctx, 0, 34, 18, c);
    ctx.fillStyle = baseGrad;

    // Center spike (downward)
    ctx.beginPath();
    ctx.moveTo(0, 44);
    ctx.bezierCurveTo(-2, 38, -3, 32, -2, 26);
    ctx.lineTo(2, 26);
    ctx.bezierCurveTo(3, 32, 2, 38, 0, 44);
    ctx.fill();

    // Side petals
    ctx.beginPath();
    ctx.moveTo(-3, 38);
    ctx.bezierCurveTo(-8, 42, -14, 40, -12, 34);
    ctx.bezierCurveTo(-10, 30, -5, 28, -3, 28);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(3, 38);
    ctx.bezierCurveTo(8, 42, 14, 40, 12, 34);
    ctx.bezierCurveTo(10, 30, 5, 28, 3, 28);
    ctx.fill();

    // Outer petals
    ctx.beginPath();
    ctx.moveTo(-10, 36);
    ctx.bezierCurveTo(-16, 42, -22, 38, -18, 32);
    ctx.bezierCurveTo(-15, 28, -10, 28, -8, 28);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(10, 36);
    ctx.bezierCurveTo(16, 42, 22, 38, 18, 32);
    ctx.bezierCurveTo(15, 28, 10, 28, 8, 28);
    ctx.fill();

    // 10. Center jewel — 3 layers (outer glow, dark recess, inner dot)
    // Outer glow
    ctx.fillStyle = c[4];
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1.0;
    // Dark recess
    ctx.fillStyle = c[0];
    ctx.beginPath();
    ctx.arc(0, 0, 3.5, 0, Math.PI * 2);
    ctx.fill();
    // Inner dot
    ctx.fillStyle = c[4];
    ctx.beginPath();
    ctx.arc(0, 0, 1.8, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // Draw a pair of acanthus leaf shapes on one side of the motif
  // side: -1 = left, +1 = right; yOff: vertical center of leaf pair
  function drawAcanthusWing(ctx, side, yOff, dir, colors) {
    var sx = side * dir; // flip for left/right
    var leafGrad = mkGrad(ctx, sx * 20, yOff, 22, colors);

    // Inner leaf — larger, closer to body
    ctx.fillStyle = leafGrad;
    ctx.beginPath();
    ctx.moveTo(sx * 4, yOff);
    ctx.bezierCurveTo(sx * 10, yOff - 12, sx * 28, yOff - 10, sx * 30, yOff - 2);
    ctx.bezierCurveTo(sx * 30, yOff + 2, sx * 22, yOff + 4, sx * 16, yOff + 2);
    ctx.bezierCurveTo(sx * 10, yOff + 1, sx * 6, yOff + 2, sx * 4, yOff);
    ctx.fill();

    // Outer leaf — smaller, splayed outward
    ctx.beginPath();
    ctx.moveTo(sx * 6, yOff + 2);
    ctx.bezierCurveTo(sx * 14, yOff - 8, sx * 32, yOff - 4, sx * 34, yOff + 2);
    ctx.bezierCurveTo(sx * 32, yOff + 6, sx * 24, yOff + 8, sx * 18, yOff + 6);
    ctx.bezierCurveTo(sx * 12, yOff + 5, sx * 8, yOff + 4, sx * 6, yOff + 2);
    ctx.fill();

    // Vein strokes — center vein + 2 branch veins per leaf
    ctx.strokeStyle = colors[4];
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = 0.5;

    // Inner leaf center vein
    ctx.beginPath();
    ctx.moveTo(sx * 5, yOff);
    ctx.bezierCurveTo(sx * 14, yOff - 6, sx * 24, yOff - 4, sx * 28, yOff - 1);
    ctx.stroke();
    // Inner leaf branch veins
    ctx.beginPath();
    ctx.moveTo(sx * 12, yOff - 4);
    ctx.lineTo(sx * 16, yOff - 7);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx * 20, yOff - 3);
    ctx.lineTo(sx * 23, yOff - 6);
    ctx.stroke();

    // Outer leaf center vein
    ctx.beginPath();
    ctx.moveTo(sx * 8, yOff + 2);
    ctx.bezierCurveTo(sx * 18, yOff - 2, sx * 28, yOff + 1, sx * 32, yOff + 3);
    ctx.stroke();
    // Outer leaf branch veins
    ctx.beginPath();
    ctx.moveTo(sx * 16, yOff);
    ctx.lineTo(sx * 19, yOff - 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx * 24, yOff + 1);
    ctx.lineTo(sx * 27, yOff - 1);
    ctx.stroke();

    ctx.globalAlpha = 1.0;
  }

  // --- Main render: brick-offset tiling across canvas ---
  function render(themeName) {
    themeName = (themeName || 'purple').toLowerCase();
    var colors = THEMES[themeName] || THEMES.purple;
    var canvas = document.getElementById('bb-bg');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var W = canvas.width, H = canvas.height;

    // Clear
    ctx.clearRect(0, 0, W, H);

    // Global alpha per spec: 0.90
    ctx.globalAlpha = 0.90;

    // Brick-offset tiling: odd rows offset by TW/2
    var cols = Math.ceil(W / TW) + 1;
    var rows = Math.ceil(H / TH) + 1;

    for (var row = 0; row < rows; row++) {
      var xOffset = (row % 2 === 1) ? TW / 2 : 0;
      for (var col = 0; col < cols; col++) {
        var cx = col * TW + TW / 2 - xOffset;
        var cy = row * TH + TH / 2;
        drawMotif(ctx, cx, cy, colors);
      }
    }

    // Reset
    ctx.globalAlpha = 1.0;
  }

  return { render: render, THEMES: THEMES };
})();
</script>

<!-- ===== Wire BBDamask into schedule fetch ===== -->
<script>
// Override renderSchedule to also trigger damask rendering
(function() {
  var _origRender = renderSchedule;
  renderSchedule = function(data) {
    _origRender(data);
    // Use theme from API data if available, otherwise default to 'purple'
    var theme = (data.theme || 'purple').toLowerCase();
    // Normalize theme name to match BBDamask keys
    var themeMap = {
      'vibes & vinyl': 'purple',
      'bass & bourbon': 'navy',
      'saturday soul sessions': 'gold',
      'the golden hour mix': 'gold',
      'beats on the rocks': 'crimson',
      'late night grooves': 'navy',
      'turntable therapy': 'teal',
      'the premium pour': 'burgundy',
      'rhythm & rye': 'emerald'
    };
    var damaskTheme = themeMap[theme] || theme;
    BBDamask.render(damaskTheme);
  };
})();
// Fallback: render immediately with default theme in case fetch fails
BBDamask.render('purple');
</script>
</body>
</html>
