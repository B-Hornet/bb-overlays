<!DOCTYPE html>
<!--
  FlyerTemplate.html — GAS HtmlService Template
  
  PURPOSE:
    Renders the full 1080×1080 BB flyer (damask background + schedule overlay)
    to an offscreen canvas, then passes the PNG data URL back to Code.gs
    via google.script.run so it can be attached to emails.

  USAGE IN Code.gs:
    See companion functions at bottom of this file (copy into Code.gs).

  GAS DEPLOYMENT NOTE:
    - Add this file to your GAS project as: FlyerTemplate.html
    - Call generateFlyerPng(scheduleData, themeName) from Code.gs
    - Returns base64 PNG suitable for MailApp.sendEmail() attachments
-->
<head>
<meta charset="utf-8">
<style>
  body { margin:0; background:#000; }
  canvas { display:none; }
</style>
</head>
<body>

<canvas id="flyer" width="1080" height="1080"></canvas>

<script>
// ── DATA INJECTED BY GAS TEMPLATE ──────────────────────────
// When served via GAS HtmlService, Code.gs substitutes the <?= ?> tags
// before the page is rendered. When opened directly in a browser for
// preview, the tags are literal strings — the try/catch catches that
// and falls back to sample data so the canvas still renders.
let SCHEDULE, THEME_NAME;
try {
  SCHEDULE   = JSON.parse('<?= scheduleJson ?>');
  THEME_NAME = '<?= themeName ?>';
} catch(e) {
  // ── BROWSER PREVIEW FALLBACK (not GAS) ──
  SCHEDULE = {
    date:     'SAT  APR  05',
    subtitle: 'THE PERFECT SATURDAY BLEND',
    footer:   'REEBOOT RADIO  ·  BEATS & BOURBON  ·  ALL SATURDAY LONG',
    lineup: [
      { time: '12 PM', dj: 'DJ PointBlanc'  },
      { time: ' 2 PM', dj: 'DJ Kutta'       },
      { time: ' 4 PM', dj: 'LaDeeGee'       },
      { time: ' 6 PM', dj: 'ReebootRadio'   },
      { time: ' 8 PM', dj: 'FullBlastRadio' },
      { time: '10 PM', dj: 'VanceDell'      },
      { time: '12 AM', dj: 'Buzz'           }
    ]
  };
  THEME_NAME = 'purple';
}

// ── THEME DEFINITIONS ──────────────────────────────────────
const THEMES = {
  classic:  { bg:['#1C0B02','#0C0500'], r:['#41220D','#7A4820','#9D6632','#D4A850','#FDF4E0'] },
  midnight: { bg:['#02060E','#010308'], r:['#0A1A3A','#152E60','#1A4080','#6090D0','#C0D8F8'] },
  crimson:  { bg:['#0E0202','#050001'], r:['#3A0808','#680F0F','#901818','#D04040','#F8C0C0'] },
  sunset:   { bg:['#0E0802','#050300'], r:['#3A1A04','#702808','#A04010','#E07030','#F8C090'] },
  purple:   { bg:['#06010E','#02000A'], r:['#1A0632','#3A1468','#5C28A0','#B878E8','#E0C0F8'] }
};

const TW = 118, TH = 112;

// ── HELPERS ────────────────────────────────────────────────
function wa(hex, a) {
  const rv=parseInt(hex.slice(1,3),16),gv=parseInt(hex.slice(3,5),16),bv=parseInt(hex.slice(5,7),16);
  return `rgba(${rv},${gv},${bv},${a})`;
}
function rGrad(ctx,cx,cy,r0,r1,ramp) {
  const g=ctx.createRadialGradient(cx,cy,r0,cx,cy,r1);
  g.addColorStop(0,ramp[4]); g.addColorStop(0.3,ramp[3]);
  g.addColorStop(0.6,ramp[2]); g.addColorStop(0.85,ramp[1]); g.addColorStop(1,ramp[0]);
  return g;
}

// ── MOTIF (identical to promo.html drop-in) ────────────────
function drawMotif(ctx, ramp) {
  function petal(tx,ty,hw) {
    const bx=tx*0.12,ht=ty+28;
    ctx.beginPath();
    ctx.moveTo(-bx,-28);
    ctx.bezierCurveTo(-hw,-28+ht*0.3,tx-hw*0.5,ty-ht*0.35,tx,ty);
    ctx.bezierCurveTo(tx+hw*0.5,ty-ht*0.35,hw,-28+ht*0.3,bx,-28);
    ctx.closePath();
    ctx.fillStyle=rGrad(ctx,tx*0.4,ty+Math.abs(ht)*0.35,0,Math.abs(ht)*0.65,ramp);
    ctx.fill();
  }
  function wing() {
    ctx.beginPath();
    ctx.moveTo(4,-20); ctx.bezierCurveTo(14,-28,32,-24,44,-15);
    ctx.bezierCurveTo(40,-10,24,-7,6,-10); ctx.closePath();
    ctx.fillStyle=rGrad(ctx,24,-17,0,26,ramp); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(5,-10); ctx.bezierCurveTo(14,-16,28,-11,36,-5);
    ctx.bezierCurveTo(28,-1,14,0,5,-3); ctx.closePath();
    ctx.fillStyle=rGrad(ctx,18,-7,0,20,ramp); ctx.fill();
    ctx.beginPath(); ctx.moveTo(5,-14); ctx.bezierCurveTo(20,-17,36,-14,44,-15);
    ctx.strokeStyle=ramp[3]; ctx.lineWidth=0.9; ctx.setLineDash([]); ctx.stroke();
  }
  ctx.strokeStyle=ramp[2]; ctx.lineWidth=1.3;
  ctx.beginPath(); ctx.ellipse(0,0,44,52,0,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle=ramp[1]; ctx.lineWidth=0.7;
  ctx.beginPath(); ctx.ellipse(0,0,38,46,0,0,Math.PI*2); ctx.stroke();
  petal(0,-50,2.5); petal(-8,-46,3.5); petal(8,-46,3.5); petal(-16,-42,4.5); petal(16,-42,4.5);
  ctx.save(); ctx.scale(1,-1);
  petal(0,-50,2.5); petal(-8,-46,3.5); petal(8,-46,3.5); petal(-16,-42,4.5); petal(16,-42,4.5);
  ctx.restore();
  ctx.beginPath(); ctx.ellipse(0,-32,9,5,0,0,Math.PI*2);
  ctx.fillStyle=rGrad(ctx,0,-32,0,10,ramp); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,32,9,5,0,0,Math.PI*2);
  ctx.fillStyle=rGrad(ctx,0,32,0,10,ramp); ctx.fill();
  ctx.beginPath(); ctx.roundRect(-3,-28,6,56,2);
  const bGrad=ctx.createLinearGradient(-3,0,3,0);
  bGrad.addColorStop(0,ramp[0]); bGrad.addColorStop(0.5,ramp[3]); bGrad.addColorStop(1,ramp[0]);
  ctx.fillStyle=bGrad; ctx.fill();
  wing();
  ctx.save(); ctx.scale(-1,1); wing(); ctx.restore();
  ctx.save(); ctx.scale(1,-1); wing(); ctx.restore();
  ctx.save(); ctx.scale(-1,-1); wing(); ctx.restore();
  ctx.beginPath(); ctx.ellipse(0,0,6,4,0,0,Math.PI*2);
  ctx.fillStyle=rGrad(ctx,0,0,0,7,ramp); ctx.fill();
  [-13,13].forEach(x=>{
    ctx.beginPath(); ctx.ellipse(x,0,4,3,0,0,Math.PI*2);
    ctx.fillStyle=rGrad(ctx,x,0,0,6,ramp); ctx.fill();
  });
  ctx.beginPath(); ctx.ellipse(0,0,7,7,0,0,Math.PI*2);
  ctx.fillStyle=wa(ramp[2],0.55); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,0,4,4,0,0,Math.PI*2);
  ctx.fillStyle=ramp[0]; ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,0,2,2,0,0,Math.PI*2);
  ctx.fillStyle=ramp[4]; ctx.fill();
}

function drawDamaskLayer(ctx,W,H,ramp) {
  ctx.save(); ctx.globalAlpha=0.90;
  const cols=Math.ceil(W/TW)+2, rows=Math.ceil(H/TH)+2;
  for(let row=-1;row<rows;row++) {
    const xOff=(row%2!==0)?TW/2:0;
    for(let col=-1;col<cols;col++) {
      ctx.save(); ctx.translate(col*TW+xOff+TW/2, row*TH+TH/2);
      drawMotif(ctx,ramp); ctx.restore();
    }
  }
  ctx.restore();
}

function applyGrain(ctx,W,H) {
  const imgd=ctx.getImageData(0,0,W,H);
  for(let i=0;i<imgd.data.length;i+=4){
    const n=(Math.random()-0.5)*16;
    imgd.data[i]+=n; imgd.data[i+1]+=n; imgd.data[i+2]+=n;
  }
  ctx.putImageData(imgd,0,0);
}

// ── ORNAMENTAL RULE ────────────────────────────────────────
// From BB_FLYER_SYSTEM.md: gold diamond + dots, always centered
function drawRule(ctx, y, W, accent) {
  ctx.strokeStyle = accent; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(80,y); ctx.lineTo(W/2-22,y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W/2+22,y); ctx.lineTo(W-80,y); ctx.stroke();
  ctx.save(); ctx.translate(W/2, y); ctx.rotate(Math.PI/4);
  ctx.strokeStyle=accent; ctx.lineWidth=1;
  ctx.strokeRect(-4,-4,8,8); ctx.restore();
  [W/2-22, W/2+22].forEach(x=>{
    ctx.beginPath(); ctx.arc(x,y,2.5,0,Math.PI*2);
    ctx.fillStyle=accent; ctx.fill();
  });
}

// ── FLYER TEXT OVERLAY ─────────────────────────────────────
// From BB_FLYER_SYSTEM.md Y-Budget Template (1080×1080 square)
function drawTextOverlay(ctx, schedule, theme) {
  const W    = 1080;
  const r    = theme.r;
  // ── FIXED TEXT COLORS — never pulled from theme ramp ──────
  // Theme ramp is for damask motif only. Text colors are spec constants.
  // Using theme ramp here causes times/footer to vanish on dark themes.
  const white = '#F2ECFF'; // near-white  — BEATS &, BOURBON, DJ names, date
  const gold  = '#F2C050'; // bright gold — times, subheads, labels, rules (bumped from #D4A84B for contrast on dark themes)
  const dim   = '#C49040'; // dim gold    — EST. 2023, footer, secondary meta (bumped from #A07830)
  // accent bar color DOES use theme ramp (decorative, not text)

  ctx.textAlign = 'center';
  ctx.setLineDash([]);

  // ── ACCENT BARS (vertical, flanking title block)
  // Left bar: x=72, Right bar: x=W-77, both 5px wide, span y=68→280
  ctx.fillStyle = r[2];
  ctx.globalAlpha = 0.85;
  ctx.fillRect(72, 68, 5, 212);
  ctx.fillRect(W-77, 68, 5, 212);
  ctx.globalAlpha = 1;

  // ── REEBOOT RADIO PRESENTS  (y=55, 20px Georgia, tracking 7px)
  ctx.font = '400 20px Georgia, serif';
  ctx.fillStyle = gold;
  ctx.letterSpacing = '7px';
  ctx.fillText('REEBOOT RADIO PRESENTS', W/2, 55);
  ctx.letterSpacing = '0px';

  // ── BEATS &  (baseline y=178, 130px Georgia bold)
  ctx.font = 'bold 130px Georgia, serif';
  ctx.fillStyle = white;
  ctx.fillText('BEATS &', W/2, 178);

  // ── BOURBON  (baseline y=306)
  ctx.fillText('BOURBON', W/2, 306);

  // ── TAGLINE  (y=346, 22px, tracking 5px)
  ctx.font = '500 22px Georgia, serif';
  ctx.fillStyle = gold;
  ctx.letterSpacing = '5px';
  ctx.fillText(schedule.subtitle || 'THE PERFECT SATURDAY BLEND', W/2, 346);
  ctx.letterSpacing = '0px';

  // ── EST. 2023  (y=370, 16px)
  ctx.font = '400 16px Georgia, serif';
  ctx.fillStyle = dim;
  ctx.letterSpacing = '4px';
  ctx.fillText('EST. 2023', W/2, 370);
  ctx.letterSpacing = '0px';

  // ── RULE 1  (y=400)
  drawRule(ctx, 400, W, gold);

  // ── PREMIUM SOUND MENU  (y=436, 20px, tracking 8px)
  ctx.font = '500 20px Georgia, serif';
  ctx.fillStyle = gold;
  ctx.letterSpacing = '8px';
  ctx.fillText('PREMIUM SOUND MENU', W/2, 436);
  ctx.letterSpacing = '0px';

  // ── LINEUP ROWS  (y=462 start, 58px step)
  // Times: Courier New 27px bold, right-aligned to W/2-20
  // Names: Georgia 27px bold, left-aligned from W/2+20
  // Pipe:  gold | at W/2
  const lineup = schedule.lineup || [];
  lineup.forEach((slot, i) => {
    const y = 462 + i * 58;

    // Time — right-aligned, monospaced, gold
    ctx.font = 'bold 27px "Courier New", monospace';
    ctx.fillStyle = gold;
    ctx.letterSpacing = '1px';
    ctx.textAlign = 'right';
    ctx.fillText(slot.time, W/2 - 20, y);

    // Pipe separator
    ctx.font = '400 27px Georgia, serif';
    ctx.fillStyle = gold;
    ctx.textAlign = 'center';
    ctx.letterSpacing = '0px';
    ctx.fillText('|', W/2, y);

    // DJ Name — left-aligned, white
    ctx.font = 'bold 27px Georgia, serif';
    ctx.fillStyle = white;
    ctx.textAlign = 'left';
    ctx.letterSpacing = '0.5px';
    ctx.fillText(slot.dj, W/2 + 20, y);
    ctx.letterSpacing = '0px';
  });

  ctx.textAlign = 'center';

  // ── RULE 2  (y=840)
  drawRule(ctx, 840, W, gold);

  // ── TWITCH BLOCK  (y=852→876)
  // Twitch logo dot: #BF94FF (brand color, decorative only)
  // Text: near-white — purple-on-purple has insufficient contrast
  ctx.font = '600 22px Georgia, serif';
  ctx.letterSpacing = '6px';
  // Purple dot (Twitch brand signal)
  ctx.fillStyle = '#BF94FF';
  ctx.fillText('●', W/2 - 100, 866);
  // White text (readable on all dark themes)
  ctx.fillStyle = white;
  ctx.fillText('LIVE ON TWITCH', W/2 + 18, 866);
  ctx.letterSpacing = '0px';

  // ── RULE 3  (y=910)
  drawRule(ctx, 910, W, gold);

  // ── DATE  (baseline y=978, 76px Arial Black, double-spaced)
  // CRITICAL: ONE fillText call, Arial Black 900-weight, double spaces between words
  ctx.font = '900 76px "Arial Black", Arial, sans-serif';
  ctx.fillStyle = white;
  ctx.letterSpacing = '8px';
  const dateParts = (schedule.date || 'SAT  APR  05').toUpperCase().split(' ').filter(Boolean);
  ctx.fillText(dateParts.join('  '), W/2, 978);
  ctx.letterSpacing = '0px';

  // ── FOOTER  (baseline y=1040, 13px Georgia)
  ctx.font = '400 13px Georgia, serif';
  ctx.fillStyle = dim;
  ctx.letterSpacing = '4px';
  ctx.fillText(schedule.footer || 'CURATED HIP-HOP, R&B, AND LIVE RADIO ENERGY', W/2, 1040);
  ctx.letterSpacing = '0px';
}

// ── MAIN RENDER ────────────────────────────────────────────
function renderFlyer() {
  const canvas = document.getElementById('flyer');
  const ctx    = canvas.getContext('2d');
  const W = 1080, H = 1080;
  const key    = (THEME_NAME || 'classic').toLowerCase();
  const theme  = THEMES[key] || THEMES.classic;
  const {bg, r} = theme;

  // Layer 1: radial gradient base
  const base = ctx.createRadialGradient(W*.5,H*.3,0,W*.5,H*.5,W*.8);
  base.addColorStop(0, bg[0]); base.addColorStop(1, bg[1]);
  ctx.fillStyle = base; ctx.fillRect(0,0,W,H);

  // Layer 2: damask
  drawDamaskLayer(ctx, W, H, r);

  // Layer 3: bloom
  const bloom = ctx.createRadialGradient(W*.5,0,0,W*.5,0,W*.6);
  bloom.addColorStop(0, wa(r[2],0.32)); bloom.addColorStop(1, wa(r[2],0));
  ctx.fillStyle = bloom; ctx.fillRect(0,0,W,H);

  // Layer 4: vignette
  const vig = ctx.createRadialGradient(W*.5,H*.5,W*.18,W*.5,H*.5,W*.78);
  vig.addColorStop(0,'transparent'); vig.addColorStop(1,'rgba(0,0,0,0.72)');
  ctx.fillStyle = vig; ctx.fillRect(0,0,W,H);

  // Layer 5: bottom fade
  const btm = ctx.createLinearGradient(0,H*.68,0,H);
  btm.addColorStop(0,'transparent'); btm.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle = btm; ctx.fillRect(0,0,W,H);

  // Layer 6: film grain
  applyGrain(ctx, W, H);

  // Layer 7: text overlay (schedule, titles, date, footer)
  drawTextOverlay(ctx, SCHEDULE, theme);

  // ── EXPORT: send PNG data URL back to Code.gs
  // In GAS sandbox: google.script.run exists — fire the callback.
  // In browser preview: show the canvas so you can inspect the output.
  const dataUrl = canvas.toDataURL('image/png');
  if (typeof google !== 'undefined' && google.script) {
    google.script.run
      .withSuccessHandler(() => {})
      .withFailureHandler(e => console.error('Flyer export failed:', e))
      .receiveFlyerPng(dataUrl);
  } else {
    // Browser preview mode — make canvas visible with download button
    canvas.style.display = 'block';
    canvas.style.width   = 'min(88vw, 560px)';
    canvas.style.height  = 'min(88vw, 560px)';
    const btn = document.createElement('button');
    btn.textContent = 'Save PNG';
    btn.style.cssText = 'display:block;margin:12px auto;padding:8px 24px;background:rgba(80,0,110,0.6);border:1px solid #7A3AAA;color:#E0C8F8;font:600 11px Georgia,serif;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:4px;';
    btn.onclick = () => {
      const a = document.createElement('a');
      a.href     = dataUrl;
      a.download = 'BB_Flyer_' + (THEME_NAME || 'preview') + '.png';
      a.click();
    };
    document.body.style.cssText = 'margin:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px;';
    document.body.appendChild(btn);
  }
}

// Run immediately when page loads in HtmlService sandbox
window.addEventListener('load', renderFlyer);
</script>
</body>
</html>


<!-- ============================================================
  COMPANION FUNCTIONS — COPY THESE INTO Code.gs
  ============================================================

/**
 * Generates a 1080×1080 PNG flyer by rendering FlyerTemplate.html
 * in a headless HtmlService sandbox and collecting the canvas output.
 *
 * @param  {Object} scheduleData  { date, subtitle, footer, lineup: [{time, dj}] }
 * @param  {string} themeName     'classic'|'midnight'|'crimson'|'sunset'|'purple'
 * @returns {GoogleAppsScript.Base.Blob}  PNG blob ready for MailApp attachment
 */
function generateFlyerPng(scheduleData, themeName) {
  // Store a callback key so receiveFlyerPng knows where to deposit the result
  const callbackKey = 'flyerPng_' + new Date().getTime();
  PropertiesService.getScriptProperties().setProperty('flyerCallbackKey', callbackKey);
  PropertiesService.getScriptProperties().deleteProperty(callbackKey);

  const template = HtmlService.createTemplateFromFile('FlyerTemplate');
  template.scheduleJson = JSON.stringify(scheduleData);
  template.themeName    = themeName || getActiveTheme().name.toLowerCase();

  // Serve the template — it renders and calls receiveFlyerPng() automatically
  const output = template.evaluate()
    .setWidth(1080)
    .setHeight(1080);

  // Poll for up to 15 seconds for the PNG data URL to arrive
  const deadline = new Date().getTime() + 15000;
  let dataUrl = null;
  while (new Date().getTime() < deadline) {
    dataUrl = PropertiesService.getScriptProperties().getProperty(callbackKey);
    if (dataUrl) break;
    Utilities.sleep(500);
  }

  PropertiesService.getScriptProperties().deleteProperty(callbackKey);
  PropertiesService.getScriptProperties().deleteProperty('flyerCallbackKey');

  if (!dataUrl) {
    throw new Error('generateFlyerPng: timed out waiting for canvas render');
  }

  // Convert data URL to blob
  const base64 = dataUrl.replace(/^data:image\/png;base64,/, '');
  return Utilities.newBlob(
    Utilities.base64Decode(base64),
    'image/png',
    'bb-flyer.png'
  );
}


/**
 * Called by FlyerTemplate.html via google.script.run
 * after canvas.toDataURL() completes.
 * Deposits the PNG data URL into ScriptProperties for pickup.
 */
function receiveFlyerPng(dataUrl) {
  const key = PropertiesService.getScriptProperties().getProperty('flyerCallbackKey');
  if (key) {
    PropertiesService.getScriptProperties().setProperty(key, dataUrl);
  }
}
